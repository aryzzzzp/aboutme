<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
    background:
    radial-gradient(circle at top left,#222 0%,#111 35%,#000 100%);
    color:white;
    overflow-x:hidden;
}

body::before{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:rgba(212,175,55,.08);
    border-radius:50%;
    filter:blur(120px);
    top:-150px;
    right:-100px;
}

body::after{
    content:'';
    position:fixed;
    width:400px;
    height:400px;
    background:rgba(255,255,255,.05);
    border-radius:50%;
    filter:blur(120px);
    bottom:-150px;
    left:-100px;
}

.container{
    width:100%;
    max-width:500px;
    position:relative;
    z-index:2;
}

.card{
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:32px;
    padding:35px;
    text-align:center;
    box-shadow:
    0 20px 60px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.1);
}

.profile{
    margin-bottom:25px;
}

.profile img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #d4af37;
    box-shadow:
    0 0 30px rgba(212,175,55,.3);
}

h1{
    margin-top:18px;
    font-size:28px;
    font-weight:700;
}

.username{
    color:#d4af37;
    margin-top:5px;
    font-size:14px;
}

.bio{
    margin-top:15px;
    color:#bdbdbd;
    line-height:1.6;
    font-size:14px;
}

.links{
    margin-top:30px;
    display:flex;
    flex-direction:column;
    gap:16px;
}

.link-btn{
    text-decoration:none;
    color:white;
    padding:18px 22px;
    border-radius:18px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    display:flex;
    align-items:center;
    justify-content:space-between;
    transition:.35s ease;
    font-weight:500;
}

.link-btn:hover{
    transform:translateY(-4px) scale(1.02);
    border-color:#d4af37;
    background:rgba(212,175,55,.08);
    box-shadow:
    0 10px 25px rgba(212,175,55,.15);
}

.link-left{
    display:flex;
    align-items:center;
    gap:14px;
}

.icon{
    width:42px;
    height:42px;
    border-radius:12px;
    background:rgba(212,175,55,.15);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
}

.arrow{
    color:#d4af37;
    font-size:18px;
}

.socials{
    margin-top:28px;
    display:flex;
    justify-content:center;
    gap:15px;
}

.socials a{
    width:48px;
    height:48px;
    border-radius:50%;
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    color:white;
    transition:.3s;
}

.socials a:hover{
    transform:translateY(-3px);
    border-color:#d4af37;
    color:#d4af37;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:#777;
}

.gold{
    color:#d4af37;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="profile">
            <img src="https://www.image2url.com/r2/default/images/1782585554223-12449ccf-9197-4f0e-a1d3-ad39944c7881.jpeg" alt="Profile">
            <h1>ARYA</h1>
            <div class="username">@aryaja</div>

            <p class="bio">
                Web Developer • UI Designer • Freelancer
                <br>
                Building modern digital experiences.
            </p>
        </div>

        <div class="links">

            <a href="https://portofolio-iota-indol.vercel.app/" class="link-btn" target="_blank">
                <div class="link-left">
                    <div class="icon">🌐</div>
                    <span>Portfolio</span>
                </div>
                <span class="arrow">→</span>
            </a>

            <a href="https://parfivra.vercel.app/" class="link-btn" target="_blank">
                <div class="link-left">
                    <div class="icon">🚀</div>
                    <span>Project</span>
                </div>
                <span class="arrow">→</span>
            </a>

            <a href="https://l1nk.dev/6zheao9" class="link-btn" target="_blank">
                <div class="link-left">
                    <div class="icon">🎵</div>
                    <span>Spotify</span>
                </div>
                <span class="arrow">→</span>
            </a>

            <a href="https://github.com/aryzzzzp" class="link-btn" target="_blank">
                <div class="link-left">
                    <div class="icon">💻</div>
                    <span>GitHub</span>
                </div>
                <span class="arrow">→</span>
            </a>

        </div>

        <div class="socials">
           <a href="https://instagram.com/arynklz" target="_blank">IG</a>
    <a href="https://tiktok.com/@arshipz" target="_blank">TT</a>
        </div>

        <div class="footer">
            © 2026 <span class="gold">Arya </span>
        </div>

    </div>

</div>

</body>
</html>
